# Keep Supabase free tier active (pings every 5 days to prevent 7-day pause)
name: Keep Supabase alive

on:
  schedule:
    # Every 5 days at 12:00 UTC
    - cron: "0 12 */5 * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keep-alive endpoint
        env:
          # Set DEPLOYMENT_URL in repo Settings → Secrets and variables → Variables
          SITE_URL: ${{ vars.DEPLOYMENT_URL }}
        run: |
          URL="${SITE_URL:-https://www.ejproperties.es}/api/keep-alive"
          echo "Pinging $URL"
          curl -sf "$URL" || exit 1
